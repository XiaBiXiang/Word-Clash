name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      multi_arch:
        description: "Build both linux/amd64 and linux/arm64"
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide build platforms
        run: |
          platforms="linux/amd64"
          needs_qemu="false"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            platforms="linux/amd64,linux/arm64"
            needs_qemu="true"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${{ inputs.multi_arch }}" == "true" ]]; then
            platforms="linux/amd64,linux/arm64"
            needs_qemu="true"
          fi

          echo "DOCKER_PLATFORMS=${platforms}" >> "$GITHUB_ENV"
          echo "NEEDS_QEMU=${needs_qemu}" >> "$GITHUB_ENV"
          echo "Using Docker platforms: ${platforms}"

      - name: Set up QEMU
        if: env.NEEDS_QEMU == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR check only)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: false
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Build and push (main/tags/manual)
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
